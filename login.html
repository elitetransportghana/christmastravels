<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Console | Elite Transport</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800;900&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ad-bg: #0b0f0d;
      --ad-surface: rgba(255,255,255,0.04);
      --ad-border: rgba(255,255,255,0.08);
      --ad-border-focus: #8dd3bb;
      --ad-mint: #8dd3bb;
      --ad-mint-dim: rgba(141,211,187,0.15);
      --ad-green-700: #245845;
      --ad-text: rgba(255,255,255,0.92);
      --ad-text-soft: rgba(255,255,255,0.55);
      --ad-text-faint: rgba(255,255,255,0.3);
      --ad-error: #f87171;
      --ad-error-bg: rgba(248,113,113,0.12);
      --font-display: 'Montserrat', 'Segoe UI', sans-serif;
      --font-body: 'Inter', 'Segoe UI', sans-serif;
    }
    html { min-height: 100%; }
    body {
      font-family: var(--font-body);
      color: var(--ad-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ad-bg);
      background-image:
        radial-gradient(800px 500px at 20% 10%, rgba(141,211,187,0.06), transparent 60%),
        radial-gradient(600px 400px at 85% 90%, rgba(141,211,187,0.04), transparent 55%);
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, #000 30%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .ad-shell {
      position: relative; z-index: 1;
      width: min(440px, calc(100% - 40px));
      display: grid; gap: 28px;
      padding: 40px 0;
    }

    /* ── Brand ── */
    .ad-brand {
      display: flex; align-items: center; gap: 14px;
      text-decoration: none; color: var(--ad-text);
    }
    .ad-brand__icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--ad-green-700), var(--ad-mint));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 900; font-size: 1.1rem; color: #fff;
      box-shadow: 0 0 24px rgba(141,211,187,0.2);
    }
    .ad-brand__text { display: grid; gap: 2px; }
    .ad-brand__name {
      font-family: var(--font-display);
      font-weight: 800; font-size: 1.05rem; letter-spacing: -0.02em;
    }
    .ad-brand__label {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--ad-mint);
    }

    /* ── Card ── */
    .ad-card {
      background: var(--ad-surface);
      border: 1px solid var(--ad-border);
      border-radius: 24px;
      padding: 36px 32px;
      backdrop-filter: blur(20px) saturate(1.3);
      box-shadow:
        0 24px 48px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 1px 0 rgba(255,255,255,0.04) inset;
    }
    .ad-card h1 {
      font-family: var(--font-display);
      font-weight: 900; font-size: 1.55rem;
      letter-spacing: -0.03em; margin-bottom: 6px;
    }
    .ad-card__sub {
      color: var(--ad-text-soft);
      font-size: 0.9rem; margin-bottom: 28px; line-height: 1.5;
    }

    /* ── Fields ── */
    .ad-field { display: grid; gap: 7px; margin-bottom: 18px; }
    .ad-field label {
      font-size: 0.78rem; font-weight: 700;
      color: var(--ad-text-soft);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .ad-field__wrap { position: relative; }
    .ad-field input {
      width: 100%; height: 50px;
      padding: 0 16px;
      border: 1px solid var(--ad-border);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      color: var(--ad-text);
      font-family: inherit; font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .ad-field input::placeholder { color: var(--ad-text-faint); }
    .ad-field input:focus {
      border-color: var(--ad-border-focus);
      box-shadow: 0 0 0 3px rgba(141,211,187,0.15);
      background: rgba(255,255,255,0.05);
    }
    .ad-field input[type="password"] { padding-right: 48px; }
    .ad-eye {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--ad-text-faint);
      cursor: pointer; font-size: 0.95rem; padding: 4px;
      transition: color 0.18s;
    }
    .ad-eye:hover { color: var(--ad-text-soft); }

    /* ── Alert ── */
    .ad-alert {
      display: none;
      padding: 12px 16px; border-radius: 12px;
      font-size: 0.85rem; font-weight: 600;
      margin-bottom: 16px; line-height: 1.4;
      align-items: center; gap: 8px;
    }
    .ad-alert--error {
      background: var(--ad-error-bg);
      border: 1px solid rgba(248,113,113,0.2);
      color: var(--ad-error);
    }
    .ad-alert.show { display: flex; }

    /* ── Button ── */
    .ad-submit {
      width: 100%; height: 52px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, #112211, var(--ad-green-700));
      color: #fff;
      font-family: inherit; font-size: 0.95rem; font-weight: 800;
      cursor: pointer;
      transition: all 0.22s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 6px;
      position: relative; overflow: hidden;
    }
    .ad-submit::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(141,211,187,0.15));
      opacity: 0; transition: opacity 0.3s;
    }
    .ad-submit:hover::before { opacity: 1; }
    .ad-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 32px rgba(141,211,187,0.12);
    }
    .ad-submit:active { transform: scale(0.99); }
    .ad-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .ad-spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: adSpin 0.6s linear infinite;
    }
    @keyframes adSpin { to { transform: rotate(360deg); } }

    /* ── Checkbox ── */
    .ad-remember {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px;
      cursor: pointer; font-size: 0.85rem;
      color: var(--ad-text-soft);
    }
    .ad-remember input { width: 18px; height: 18px; accent-color: var(--ad-mint); cursor: pointer; }

    /* ── Footer ── */
    .ad-footer {
      text-align: center; font-size: 0.8rem;
      color: var(--ad-text-faint);
    }
    .ad-footer a {
      color: var(--ad-mint); text-decoration: none;
      font-weight: 700; transition: opacity 0.18s;
    }
    .ad-footer a:hover { opacity: 0.8; }

    /* ── Decorative ── */
    .ad-glow {
      position: fixed;
      width: 320px; height: 320px; border-radius: 50%;
      background: radial-gradient(circle, rgba(141,211,187,0.08), transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .ad-glow--tl { top: -80px; left: -60px; }
    .ad-glow--br { bottom: -100px; right: -80px; }

    /* ── Shield badge ── */
    .ad-shield {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-radius: 12px;
      background: rgba(141,211,187,0.06);
      border: 1px solid rgba(141,211,187,0.1);
      font-size: 0.78rem; font-weight: 600;
      color: var(--ad-text-soft);
      margin-top: 20px;
    }
    .ad-shield i { color: var(--ad-mint); font-size: 0.9rem; }

    @media (max-width: 480px) {
      .ad-card { padding: 28px 22px; border-radius: 20px; }
      .ad-card h1 { font-size: 1.35rem; }
    }
  </style>
</head>
<body>
  <div class="ad-glow ad-glow--tl"></div>
  <div class="ad-glow ad-glow--br"></div>

  <div class="ad-shell">
    <a class="ad-brand" href="../index.html">
      <div class="ad-brand__icon">E</div>
      <div class="ad-brand__text">
        <span class="ad-brand__name">Elite Transport</span>
        <span class="ad-brand__label">Platform Admin</span>
      </div>
    </a>

    <div class="ad-card">
      <h1>Admin Console</h1>
      <p class="ad-card__sub">Sign in with your platform administrator credentials.</p>

      <div class="ad-alert ad-alert--error" id="adAlert">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="adAlertMsg"></span>
      </div>

      <form id="adForm" autocomplete="on">
        <div class="ad-field">
          <label for="adEmail">Email address</label>
          <input type="email" id="adEmail" autocomplete="email" placeholder="admin@elitetransport.com" required />
        </div>

        <div class="ad-field">
          <label for="adPass">Password</label>
          <div class="ad-field__wrap">
            <input type="password" id="adPass" autocomplete="current-password" placeholder="Enter your password" required />
            <button type="button" class="ad-eye" id="adEye" aria-label="Toggle password"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>

        <label class="ad-remember">
          <input type="checkbox" id="adRemember" checked />
          Keep me signed in
        </label>

        <button type="submit" class="ad-submit" id="adBtn">
          <i class="fa-solid fa-shield-halved"></i>
          Sign In to Admin
        </button>
      </form>

      <div class="ad-shield">
        <i class="fa-solid fa-lock"></i>
        Restricted to platform administrators only. Unauthorized access attempts are logged.
      </div>
    </div>

    <div class="ad-footer">
      <a href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to Elite Transport</a>
    </div>
  </div>

  <script src="../supabase-config.js?v=3"></script>
  <script>
  (function () {
    'use strict';
    const SUPABASE_CONFIG = window.ELITE_SUPABASE_CONFIG || {};
    const API = resolveApiOrigin();

    function resolveApiOrigin() {
      const configuredOrigin = SUPABASE_CONFIG.workerOrigin || SUPABASE_CONFIG.apiOrigin || SUPABASE_CONFIG.apiBase || '';
      if (!configuredOrigin) return window.location.origin.replace(/\/+$/, '');
      return String(configuredOrigin).replace(/\/api\/?$/, '').replace(/\/+$/, '');
    }

    const form = document.getElementById('adForm');
    const emailEl = document.getElementById('adEmail');
    const passEl = document.getElementById('adPass');
    const btn = document.getElementById('adBtn');
    const alertBox = document.getElementById('adAlert');
    const alertMsg = document.getElementById('adAlertMsg');
    const eyeBtn = document.getElementById('adEye');
    const rememberEl = document.getElementById('adRemember');

    function showErr(msg) { alertMsg.textContent = msg; alertBox.classList.add('show'); }
    function clearErr() { alertBox.classList.remove('show'); }
    function setLoading(on) {
      btn.disabled = on;
      btn.innerHTML = on
        ? '<div class="ad-spinner"></div> Signing in\u2026'
        : '<i class="fa-solid fa-shield-halved"></i> Sign In to Admin';
    }

    function persistSession(token, user) {
      const store = rememberEl.checked ? localStorage : sessionStorage;
      const other = rememberEl.checked ? sessionStorage : localStorage;
      store.setItem('authToken', token);
      store.setItem('user', JSON.stringify(user));
      store.setItem('eliteAuthStorageMode', rememberEl.checked ? 'local' : 'session');
      other.removeItem('authToken');
      other.removeItem('user');
      other.removeItem('eliteAuthStorageMode');
    }

    async function signInWithWorker(email, password) {
      const res = await fetch(API + '/api/auth/signin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Login failed');
      return { token: data.token, user: data.user };
    }

    async function verifyTokenAndGetUser(token) {
      const r = await fetch(API + '/api/auth/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ token })
      });
      const d = await r.json();
      if (!r.ok || !d.valid) throw new Error(d.error || 'Verification failed');
      return d.user;
    }

    eyeBtn.addEventListener('click', () => {
      const show = passEl.type === 'password';
      passEl.type = show ? 'text' : 'password';
      eyeBtn.querySelector('i').className = show ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    });

    // Auto-redirect if already authenticated
    (async () => {
      const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
      if (!token) return;
      try {
        const user = await verifyTokenAndGetUser(token);
        if (user?.isAdmin) window.location.replace('./');
      } catch (_) {}
    })();

    form.addEventListener('submit', async e => {
      e.preventDefault();
      clearErr();
      const email = emailEl.value.trim();
      const password = passEl.value;
      if (!email || !password) return showErr('Email and password are required.');
      setLoading(true);
      try {
        const session = await signInWithWorker(email, password);
        const token = session.token;
        const user = session.user;

        if (!user?.isAdmin) {
          throw new Error('Access denied. This account does not have platform administrator privileges.');
        }

        persistSession(token, user);
        window.location.replace('./');
      } catch (err) {
        showErr(err.message || 'Login failed.');
      } finally {
        setLoading(false);
      }
    });
  })();
  </script>
</body>
</html>
